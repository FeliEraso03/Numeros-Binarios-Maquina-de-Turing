<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador de Máquina de Turing - Contador Binario</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Máquina de Turing Animada</h1>
    <p class="sub">Algoritmo de Generación de Contador Binario Infinito</p>
    <p class="sub" style="font-size: 0.9em; color: #a0a0a0; margin-top: -10px; margin-bottom: 20px;">Presentado por: Juan Felipe Eraso Navarro</p>
    <div class="container">
      <div class="graph-panel">
        <h3>Grafo de Transiciones</h3>
        <div id="graph-container">
          <!-- El SVG se cargará aquí dinámicamente mediante main.js -->
        </div>
      </div>

      <div class="status-bar">
        <span>Estado: <strong class="st" id="lbl-state">q0</strong></span>
        <span>Pasos: <strong class="sp" id="lbl-steps">0</strong></span>
      </div>
      <div class="controls">
        <button id="btn-step-back" disabled>⏮ Atrás</button>
        <button id="btn-step">⏭ Paso</button>
        <button id="btn-play">▶ Auto</button>
        <button id="btn-pause" style="display: none">⏸ Pausar</button>
        <button id="btn-reset">↺ Reset</button>
        <div class="slider-container">
          <label for="speed">Vel:</label
          ><input
            type="range"
            id="speed"
            min="100"
            max="1500"
            value="600"
            step="100"
          />
        </div>
      </div>

      <div class="tape-section">
        <h3>Cinta</h3>
        <div class="tape-scroll">
          <div class="tape" id="tape-wrapper"></div>
        </div>
      </div>

      <div class="table-panel">
        <h3>Tabla de Transiciones</h3>
        <table>
          <thead>
            <tr>
              <th>Origen</th>
              <th>Lee</th>
              <th>Escribe</th>
              <th>Mueve</th>
              <th>Destino</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      
      <div class="history-panels" style="display: flex; gap: 14px; margin-top: 14px; margin-bottom: 20px;">
        <div class="history-panel" style="flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px;">
          <h3 style="font-size: 0.7rem; color: #636e84; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;">Historial de Transiciones</h3>
          <div id="transition-history" style="height: 150px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #a0a0a0; padding: 8px; background: #0d1220; border-radius: 8px; display: flex; flex-direction: column; gap: 4px;">
          </div>
        </div>
        <div class="history-panel" style="flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px;">
          <h3 style="font-size: 0.7rem; color: #636e84; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;">Palabras Generadas</h3>
          <div id="word-history" style="height: 150px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #00e676; padding: 8px; background: #0d1220; border-radius: 8px; display: flex; flex-direction: column; gap: 4px;">
          </div>
        </div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
